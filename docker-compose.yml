services:
  mysql:
    image: mysql:8.4
    container_name: matex-mysql
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-matex}
      MYSQL_USER: ${MYSQL_USER:-matex}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-matexpass}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    volumes:
      - matex_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-rootpass}"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  matex_mysql_data: