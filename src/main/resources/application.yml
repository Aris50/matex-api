spring:
  docker:
    compose:
      enabled: false
  servlet:
    multipart:
      enabled: true
      max-file-size: 20MB
      max-request-size: 50MB
  datasource:
    url: jdbc:mysql://127.0.0.1:3307/matex?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${MYSQL_USER:matex}
    password: ${MYSQL_PASSWORD:matexpass}

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    repair-on-migrate: true

server:
  port: 8080

matex:
  storage:
    root: storage
  jwt:
    secret: ${JWT_SECRET:default-dev-secret-change-in-production-must-be-at-least-64-chars-long!!}
    expiration-ms: 86400000   # 24 hours

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger